<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام | LUXE PERFUME</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c1f 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(212, 163, 115, 0.3), transparent);
            border-radius: 50%;
            animation: floatParticle 15s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-50px) translateX(30px) scale(1.2); opacity: 0.6; }
        }

        /* Glass Card */
        .register-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            margin: 40px 20px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 44px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
        }

        .register-card:hover {
            border-color: rgba(212, 163, 115, 0.4);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.4);
        }

        /* Logo */
        .register-logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 56px;
            display: inline-block;
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .register-logo h1 {
            font-size: 28px;
            font-weight: 600;
            color: white;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .register-logo h1 span {
            color: #d4af37;
        }

        .register-logo p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }

        /* Progress Steps */
        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }

        .step {
            text-align: center;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .step.active {
            background: linear-gradient(135deg, #d4af37, #b8960c);
            color: #1a1a2e;
            border-color: transparent;
            box-shadow: 0 5px 15px rgba(212, 163, 115, 0.3);
        }

        /* Forms */
        .register-step {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .register-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            font-size: 14px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.1);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group select option {
            background: #1a1a2e;
            color: white;
        }

        /* Row 2 columns */
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Password strength */
        .password-strength {
            margin-top: 8px;
        }

        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }

        .strength-text {
            font-size: 10px;
            margin-top: 5px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Terms checkbox */
        .terms-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 25px 0;
        }

        .terms-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #d4af37;
        }

        .terms-group label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .terms-group a {
            color: #d4af37;
            text-decoration: none;
        }

        /* Buttons */
        .btn-next, .btn-register {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8960c);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-next:hover, .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 163, 115, 0.4);
            gap: 15px;
        }

        .btn-back {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #d4af37;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 30px 0 25px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Social Login */
        .social-buttons {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #d4af37;
            transform: translateY(-2px);
        }

        /* Login link */
        .login-link {
            text-align: center;
            margin-top: 28px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        .login-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Back to site */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #d4af37;
        }

        /* Responsive */
        @media (max-width: 550px) {
            .register-card {
                padding: 32px 24px;
            }
            
            .row-2 {
                grid-template-columns: 1fr;
                gap: 0;
            }
            
            .social-buttons {
                flex-direction: column;
            }
            
            .progress-steps {
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
            }
            
            .progress-steps::before {
                display: none;
            }
            
            .step {
                padding: 6px 16px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<script>
    // Generate floating particles
    for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 150 + 50;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        document.body.appendChild(particle);
    }
</script>

<div class="register-container">
    <div class="register-card">
        <div class="register-logo">
            <div class="logo-icon">🪄</div>
            <h1>LUXE <span>PERFUME</span></h1>
            <p>عضو خانواده لوکس شوید</p>
        </div>

        <!-- Progress Steps -->
        <div class="progress-steps">
            <div class="step active" id="step1Indicator">اطلاعات شخصی</div>
            <div class="step" id="step2Indicator">حساب کاربری</div>
            <div class="step" id="step3Indicator">تکمیل</div>
        </div>

        <!-- Step 1: Personal Info -->
        <div class="register-step active" id="step1">
            <form id="personalForm">
                <div class="row-2">
                    <div class="input-group">
                        <label>نام</label>
                        <input type="text" placeholder="سارا" id="firstName" required>
                    </div>
                    <div class="input-group">
                        <label>نام خانوادگی</label>
                        <input type="text" placeholder="احمدی" id="lastName" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>شماره موبایل</label>
                    <input type="tel" placeholder="۰۹۱۲۳۴۵۶۷۸۹" id="phone" required>
                </div>
                <div class="input-group">
                    <label>تاریخ تولد</label>
                    <input type="date" id="birthdate">
                </div>
                <div class="input-group">
                    <label>جنسیت</label>
                    <select id="gender">
                        <option value="">انتخاب کنید</option>
                        <option value="female">زن</option>
                        <option value="male">مرد</option>
                        <option value="other">سایر</option>
                    </select>
                </div>
                <button type="button" class="btn-next" id="nextStep1">
                    مرحله بعد
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Step 2: Account Info -->
        <div class="register-step" id="step2">
            <form id="accountForm">
                <div class="input-group">
                    <label>ایمیل</label>
                    <input type="email" placeholder="example@email.com" id="email" required>
                </div>
                <div class="input-group">
                    <label>نام کاربری</label>
                    <input type="text" placeholder="sara.ahmadi" id="username" required>
                </div>
                <div class="input-group">
                    <label>رمز عبور</label>
                    <input type="password" placeholder="••••••••" id="password" required onkeyup="checkPasswordStrength()">
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText">رمز عبور قوی وارد کنید</div>
                    </div>
                </div>
                <div class="input-group">
                    <label>تکرار رمز عبور</label>
                    <input type="password" placeholder="••••••••" id="confirmPassword" required>
                </div>
                <button type="button" class="btn-next" id="nextStep2">
                    مرحله بعد
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
                <button type="button" class="btn-back" id="backStep2">
                    ← بازگشت به مرحله قبل
                </button>
            </form>
        </div>

        <!-- Step 3: Complete -->
        <div class="register-step" id="step3">
            <div class="terms-group">
                <input type="checkbox" id="acceptTerms">
                <label> <a href="#">قوانین و مقررات</a> را مطالعه کرده و می‌پذیرم</label>
            </div>
            <div class="terms-group">
                <input type="checkbox" id="acceptNewsletter">
                <label> خبرنامه و تخفیف‌های ویژه را دریافت کنم</label>
            </div>
            
            <button type="button" class="btn-register" id="finalRegister">
                ثبت نام نهایی
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 6L9 17l-5-5"/>
                </svg>
            </button>
            <button type="button" class="btn-back" id="backStep3">
                ← بازگشت به مرحله قبل
            </button>
        </div>

        <!-- Divider -->
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">یا ثبت نام با</span>
            <div class="divider-line"></div>
        </div>

        <!-- Social Register -->
        <div class="social-buttons">
            <button class="social-btn" onclick="socialRegister('google')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                    <path d="M8 12h8"/>
                    <path d="M12 8v8"/>
                </svg>
                گوگل
            </button>
            <button class="social-btn" onclick="socialRegister('instagram')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="2" y="2" width="20" height="20" rx="4"/>
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M17.5 6.5v.01"/>
                </svg>
                اینستاگرام
            </button>
        </div>

        <div class="login-link">
            قبلاً ثبت نام کرده‌اید؟ <a href="login.html">ورود به حساب</a>
        </div>

        <a href="index.html" class="back-link">
            ← بازگشت به فروشگاه
        </a>
    </div>
</div>

<script>
    // Step Navigation
    let currentStep = 1;
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const step1Indicator = document.getElementById('step1Indicator');
    const step2Indicator = document.getElementById('step2Indicator');
    const step3Indicator = document.getElementById('step3Indicator');

    function updateSteps(step) {
        step1.classList.remove('active');
        step2.classList.remove('active');
        step3.classList.remove('active');
        step1Indicator.classList.remove('active');
        step2Indicator.classList.remove('active');
        step3Indicator.classList.remove('active');
        
        if (step === 1) {
            step1.classList.add('active');
            step1Indicator.classList.add('active');
        } else if (step === 2) {
            step2.classList.add('active');
            step2Indicator.classList.add('active');
        } else {
            step3.classList.add('active');
            step3Indicator.classList.add('active');
        }
    }

    // Next Step 1
    document.getElementById('nextStep1').addEventListener('click', () => {
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const phone = document.getElementById('phone').value;
        
        if (!firstName || !lastName || !phone) {
            alert('لطفا نام، نام خانوادگی و شماره موبایل را وارد کنید.');
            return;
        }
        
        if (phone.length < 10) {
            alert('شماره موبایل معتبر وارد کنید.');
            return;
        }
        
        currentStep = 2;
        updateSteps(currentStep);
    });

    // Next Step 2
    document.getElementById('nextStep2').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        
        if (!email || !username || !password) {
            alert('لطفا ایمیل، نام کاربری و رمز عبور را وارد کنید.');
            return;
        }
        
        if (password !== confirm) {
            alert('رمز عبور و تکرار آن مطابقت ندارند.');
            return;
        }
        
        if (password.length < 6) {
            alert('رمز عبور باید حداقل ۶ کاراکتر باشد.');
            return;
        }
        
        currentStep = 3;
        updateSteps(currentStep);
    });

    // Back buttons
    document.getElementById('backStep2').addEventListener('click', () => {
        currentStep = 1;
        updateSteps(currentStep);
    });
    
    document.getElementById('backStep3').addEventListener('click', () => {
        currentStep = 2;
        updateSteps(currentStep);
    });

    // Password Strength Checker
    function checkPasswordStrength() {
        const password = document.getElementById('password').value;
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        
        const percent = (strength / 5) * 100;
        strengthFill.style.width = percent + '%';
        
        if (percent < 20) {
            strengthFill.style.background = '#e74c3c';
            strengthText.textContent = 'رمز عبور ضعیف';
            strengthText.style.color = '#e74c3c';
        } else if (percent < 50) {
            strengthFill.style.background = '#f39c12';
            strengthText.textContent = 'رمز عبور متوسط';
            strengthText.style.color = '#f39c12';
        } else if (percent < 80) {
            strengthFill.style.background = '#2ecc71';
            strengthText.textContent = 'رمز عبور خوب';
            strengthText.style.color = '#2ecc71';
        } else {
            strengthFill.style.background = '#27ae60';
            strengthText.textContent = 'رمز عبور عالی';
            strengthText.style.color = '#27ae60';
        }
    }

    // Final Registration
    document.getElementById('finalRegister').addEventListener('click', () => {
        const acceptTerms = document.getElementById('acceptTerms').checked;
        
        if (!acceptTerms) {
            alert('لطفا قوانین و مقررات را بپذیرید.');
            return;
        }
        
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const email = document.getElementById('email').value;
        
        alert(`تبریک ${firstName} ${lastName}!\nحساب کاربری شما با ایمیل ${email} با موفقیت ایجاد شد.\nبه خانواده لوکس LUXE PERFUME خوش آمدید.`);
        window.location.href = 'index.html';
    });

    function socialRegister(provider) {
        alert(`در حال اتصال به ${provider}...\nثبت نام از طریق ${provider} به زودی فعال می‌شود.`);
    }
</script>

</body>
</html>
