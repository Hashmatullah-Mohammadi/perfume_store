<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | LUXE PERFUME</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c1f 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(212, 163, 115, 0.3), transparent);
            border-radius: 50%;
            animation: floatParticle 15s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-50px) translateX(30px) scale(1.2); opacity: 0.6; }
        }

        /* Glass Card */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            margin: 40px 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 44px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
        }

        .login-card:hover {
            border-color: rgba(212, 163, 115, 0.4);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.4);
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 56px;
            display: inline-block;
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .login-logo h1 {
            font-size: 28px;
            font-weight: 600;
            color: white;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .login-logo h1 span {
            color: #d4af37;
        }

        .login-logo p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }

        /* Welcome Text */
        .welcome-text {
            text-align: center;
            margin-bottom: 32px;
        }

        .welcome-text h2 {
            font-size: 22px;
            color: white;
            margin-bottom: 8px;
        }

        .welcome-text p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            font-size: 14px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.1);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Password Row */
        .password-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .forgot-link {
            font-size: 12px;
            color: #d4af37;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .forgot-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Remember Me */
        .remember-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .remember-group input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #d4af37;
        }

        .remember-group label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8960c);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 163, 115, 0.4);
            gap: 15px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 30px 0 25px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Social Login */
        .social-buttons {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #d4af37;
            transform: translateY(-2px);
        }

        /* Register Link */
        .register-link {
            text-align: center;
            margin-top: 28px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        .register-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Back to site */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #d4af37;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .login-card {
                padding: 36px 24px;
            }
            
            .social-buttons {
                flex-direction: column;
            }
            
            .login-logo .logo-icon {
                font-size: 48px;
            }
            
            .login-logo h1 {
                font-size: 24px;
            }
            
            .welcome-text h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<script>
    // Generate floating particles
    for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 150 + 50;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        document.body.appendChild(particle);
    }
</script>

<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">🪄</div>
            <h1>LUXE <span>PERFUME</span></h1>
            <p>عطرهای لوکس اصل اروپایی</p>
        </div>

        <div class="welcome-text">
            <h2>خوش آمدید</h2>
            <p>برای ورود، ایمیل و رمز عبور خود را وارد کنید</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="input-group">
                <label>ایمیل یا شماره موبایل</label>
                <input type="text" placeholder="example@email.com" id="loginEmail" required>
            </div>
            <div class="input-group">
                <div class="password-row">
                    <label>رمز عبور</label>
                    <a href="#" class="forgot-link" id="forgotLink">فراموش کردید؟</a>
                </div>
                <input type="password" placeholder="••••••••" id="loginPassword" required>
            </div>

            <div class="remember-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">مرا به خاطر بسپار</label>
            </div>

            <button type="submit" class="btn-login">
                ورود به حساب
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">یا ورود با</span>
            <div class="divider-line"></div>
        </div>

        <!-- Social Login -->
        <div class="social-buttons">
            <button class="social-btn" onclick="socialLogin('google')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                    <path d="M8 12h8"/>
                    <path d="M12 8v8"/>
                </svg>
                گوگل
            </button>
            <button class="social-btn" onclick="socialLogin('instagram')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="2" y="2" width="20" height="20" rx="4"/>
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M17.5 6.5v.01"/>
                </svg>
                اینستاگرام
            </button>
        </div>

        <div class="register-link">
            حساب کاربری ندارید؟ <a href="register.html">ثبت نام</a>
        </div>

        <a href="index.html" class="back-link">
            ← بازگشت به فروشگاه
        </a>
    </div>
</div>

<script>
    // Login Form Submit
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!email || !password) {
                alert('لطفا ایمیل و رمز عبور را وارد کنید.');
                return;
            }
            
            alert(`خوش آمدید ${email}\nورود با موفقیت انجام شد.`);
            
            if (rememberMe) {
                localStorage.setItem('rememberedUser', email);
            }
            
            window.location.href = 'index.html';
        });
    }

    // Forgot Password
    const forgotLink = document.getElementById('forgotLink');
    if (forgotLink) {
        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            if (email) {
                alert(`لینک بازیابی رمز عبور به ایمیل ${email} ارسال شد.`);
            } else {
                alert('لطفا ایمیل خود را وارد کنید تا لینک بازیابی برای شما ارسال شود.');
            }
        });
    }

    // Social Login
    function socialLogin(provider) {
        alert(`در حال اتصال به ${provider}...\nورود از طریق ${provider} به زودی فعال می‌شود.`);
    }

    // Auto fill remembered user
    const rememberedUser = localStorage.getItem('rememberedUser');
    if (rememberedUser && document.getElementById('loginEmail')) {
        document.getElementById('loginEmail').value = rememberedUser;
        document.getElementById('rememberMe').checked = true;
    }
</script>

</body>
</html>
